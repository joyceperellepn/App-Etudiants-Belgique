
name: CI Student App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          # Cette commande trouve automatiquement le dossier contenant package.json
          DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \;)
          echo "Dossier trouvé : $DIR"
          cd "$DIR"
          npm install
          npm run build --if-present
